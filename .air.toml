# .air.toml — Live-reload config for Go backend
root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main ./cmd/server"
  delay = 1000
  exclude_dir = ["tmp", "web", "recordings", "uploads", "data", ".git", "skyroom_saved_ui", ".kilo", ".mimocode"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "sql", "yaml"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
