version: '3.8'

services:
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"
      - "7881:7881"
    command: --config /etc/livekit.yaml --node-ip=127.0.0.1
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Tehran
    volumes:
      - ./data:/app/iroom.db
      - ./uploads:/app/uploads
      - ./recordings:/app/recordings
    depends_on:
      - livekit
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
