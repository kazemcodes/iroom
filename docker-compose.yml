services:
  janus:
    image: canyan/janus-gateway:latest
    ports:
      - "8088:8088"
      - "8188:8188"
      - "20000-60000:20000-60000/udp"
    volumes:
      - ./janus-config:/etc/janus
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8088/janus/info || curl -sf http://localhost:8088/janus/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - TZ=Asia/Tehran
      - JANUS_HTTP_URL=http://janus:8088
      - JANUS_WS_URL=ws://janus:8188
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./recordings:/app/recordings
    depends_on:
      janus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/v1/health || curl -sf http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
